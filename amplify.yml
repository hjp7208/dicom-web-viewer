version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Amplify 콘솔에 등록된 환경 변수를 빌드 컨테이너의 .env.production으로 주입
        - echo "BACKEND_BASE_URL=$BACKEND_BASE_URL" >> .env.production
        - echo "BACKEND_BASIC_AUTH=$BACKEND_BASIC_AUTH" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
